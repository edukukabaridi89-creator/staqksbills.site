<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" type="image/png" href="images/logo.png">

<script defer src="js/products.js"></script>
<script defer src="js/cart.js"></script>
<script defer src="js/product.js"></script>
</head>

<body>

<nav class="navbar">
  <div class="logo">StaqksBills<sup>®</sup></div>

  <ul class="navlinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="index.html#shop">Products</a></li>
    <li><a href="index.html#reviews">Reviews</a></li>
  </ul>

  <a href="cart.html" class="cart">
    🛒 <span id="cartCount" class="cart-count">0</span>
  </a>
</nav>

<section class="product-page">

  <div class="product-image">
    <img id="productImage" src="images/placeholder.jpg" alt="Product Image">
  </div>

  <div class="product-info">
    <h2 id="productName">Product Name</h2>
    <p id="productDescription">Loading description...</p>

    <div class="quantity">
      <button id="minus">-</button>
      <input id="qty" type="number" value="1" min="1">
      <button id="plus">+</button>
    </div>

    <button id="addCart" class="viewbtn">Add To Cart</button>
    <button id="buyNow" class="buybtn">Buy Now</button>
  </div>
</section>

<section class="other-products">
  <h3>More Products</h3>
  <div id="relatedProducts" class="products"></div>
</section>

</body>

<!-- Floating Telegram Chat -->
<a href="https://t.me/richoffethh" class="telegram-float" onclick="window.location.href=this.href">
  🟢 Live chat with us...
</a>
</html>
