<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" type="image/png" href="images/logo.png">
<script defer src="js/cart.js"></script>
<script defer src="js/checkout.js"></script>
</head>

<body>

<nav class="navbar">
  <div class="logo">StaqksBills<sup>®</sup></div>
  <ul class="navlinks">
    <li><a href="index.html#Home">Home</a></li>
    <li><a href="index.html#shop">Products</a></li>
    <li><a href="cart.html#Cart">Cart</a></li>
  </ul>
</nav>

<section class="checkout">
  <h2>Checkout</h2>
  <p class="checkout-note">
  🔒 Your information is secure and encrypted.  
  After payment, contact support with proof for fast processing.
</p>

  <form id="checkoutForm">
    <input required id="firstName" placeholder="First Name">
    <input required id="lastName" placeholder="Last Name">
    <input required id="email" type="email" placeholder="Email">
    <input required id="address" placeholder="Delivery Address">

    <select id="payment" required>
        <option value="" disabled selected>Select Payment Method</option>
        <option value="Bitcoin">Bitcoin (BTC)</option>
        <option value="Ethereum">Ethereum (ETH)</option>
        <option value="Solana">Solana (SOL)</option>
        <option value="Voucher">Crypto Voucher (Card/Apple Pay)</option>
    </select>

    <!-- New Voucher Input Field (Hidden by default) -->
    <div id="voucherInputGroup" style="display: none; margin-top: 15px;">
        <p style="font-size: 0.85em; color: #ffcc00; margin-bottom: 5px;">
            IF YOU ONLY HAVE CARD, <a href="#" id="dynamicG2ALink" target="_blank" style="text-decoration: underline; color: #fff;">BUY A CRYPTO VOUCHER HERE</a>.
        </p>
        <input id="voucherCode" placeholder="Enter Voucher Code (GMC-XXXX-XXXX)">
    </div>

    <button type="submit" style="margin-top: 15px;">Generate Order</button>
</form>

  <div id="orderSummary" style="margin-top:20px;"></div>
  <button id="copyAddressBtn" style="display:none;">Copy Payment Address</button>
</section>

<!-- Floating Telegram Chat -->
<a href="https://t.me/upoffbtcc" class="telegram-float" onclick="window.location.href=this.href">
  🟢 Live chat with us...
</a>
</body>
</html>
